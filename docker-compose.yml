services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: anan-blueprint-homepage:latest
    container_name: anan-blueprint-homepage
    restart: unless-stopped
    env_file:
      - path: /etc/anan-blueprint/app.env
        required: false
    ports:
      - "127.0.0.1:3030:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
