services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: anan-blueprint-homepage:latest
    container_name: anan-blueprint-homepage
    restart: unless-stopped
    environment:
      - PORT=80
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
